name: Sync live scores

# Pulls live World Cup scores into the app + reruns scoring, by calling the
# token-guarded /internal/sync-scores endpoint. One call updates all live games,
# well within football-data.org's 10 req/min free limit.
#
# Repo secrets required (Settings → Secrets and variables → Actions):
#   APP_URL     e.g. https://superpredicto.example.com   (no trailing slash)
#   SYNC_TOKEN  must equal the app's INTERNAL_SYNC_TOKEN env var
#
# Note: GitHub cron is UTC and can be delayed a few minutes under load; that's
# fine for scoring. Tighten the interval during match days if you like.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC)
  workflow_dispatch: {}       # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        run: |
          curl -fsS -X POST \
            -H "X-Sync-Token: ${{ secrets.SYNC_TOKEN }}" \
            "${{ secrets.APP_URL }}/internal/sync-scores"
