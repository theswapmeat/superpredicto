<!-- 404.html -->
{% extends "base.html" %}
{% block title %}Page Not Found — SuperPredicto{% endblock %}
{% block content %}
<div class="auth-wrap" style="text-align:center; padding-top:64px">
  <div style="font-family:'Saira Condensed',sans-serif; font-weight:900; font-size:clamp(72px,14vw,120px); line-height:.9; letter-spacing:-.02em; color:var(--emb)">404</div>
  <h1 class="auth-title" style="margin-top:10px">Page Not <span>Found</span></h1>
  <p class="auth-sub" style="margin:12px auto 22px">Oops! The page you're looking for doesn't exist or has moved.</p>
  <a href="{{ url_for('main.index') }}" class="sp-btn sp-btn-primary">← Back to home</a>
</div>
{% endblock %}
