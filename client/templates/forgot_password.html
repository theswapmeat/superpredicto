{% extends "base.html" %}
{% block title %}Forgot Password — SuperPredicto{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card">
    <div class="auth-head">
      <span class="auth-kicker">
        <svg class="hb" viewBox="0 0 240 60" fill="none"><path pathLength="100" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M0,30 L96,30 L106,30 L114,8 L122,52 L130,30 L240,30" /></svg>
        Account recovery
      </span>
      <h1 class="auth-title">Forgot <span>Password</span></h1>
      <p class="auth-sub">Enter your email and we'll send you a link to reset your password.</p>
    </div>

    <form method="post">
      <div class="sp-field">
        <label for="email" class="sp-label">Email address</label>
        <input type="email" class="sp-input" id="email" name="email" placeholder="name@example.com" required />
      </div>
      <button type="submit" class="sp-btn sp-btn-primary sp-btn-block">Send reset link →</button>
    </form>

    <div class="auth-foot">
      <a href="{{ url_for('main.login') }}">Back to log in</a>
    </div>
  </div>
</div>
{% endblock %}
