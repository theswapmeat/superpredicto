<!-- templates/login.html -->
{% extends "base.html" %}
{% block title %}Log In — SuperPredicto{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card">
    <div class="auth-head">
      <span class="auth-kicker">
        <svg class="hb" viewBox="0 0 240 60" fill="none"><path pathLength="100" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M0,30 L96,30 L106,30 L114,8 L122,52 L130,30 L240,30" /></svg>
        Welcome back
      </span>
      <h1 class="auth-title">Log <span>In</span></h1>
      <p class="auth-sub">Sign in to lock your picks and track your spot on the leaderboard.</p>
    </div>

    <form method="post" autocomplete="on">
      <div class="sp-field">
        <label for="email" class="sp-label">Email</label>
        <input type="email" class="sp-input" id="email" name="email" autocomplete="username" placeholder="name@example.com" required />
      </div>

      <div class="sp-field">
        <label for="password" class="sp-label">Password</label>
        <input type="password" class="sp-input" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>

      <label class="sp-check" for="remember">
        <input type="checkbox" id="remember" name="remember" />
        Remember me
      </label>

      <button type="submit" class="sp-btn sp-btn-primary sp-btn-block">Log in →</button>
    </form>

    <div class="auth-foot">
      <a href="{{ url_for('main.forgot_password') }}">Forgot your password?</a>
    </div>
  </div>
</div>
{% endblock %}
