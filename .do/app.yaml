# DigitalOcean App Platform — SuperPredicto
#
# Why this file exists (vs. clicking it together in the dashboard): the PRE_DEPLOY
# `migrate` job below. It runs `flask db upgrade` against the database AFTER the
# build but BEFORE the new web release receives traffic — so the schema is always
# migrated before the code that depends on it serves a request. That makes the
# "column does not exist" outage class structurally impossible.
#
# Source layout: the Flask app (server/) renders templates/static from the sibling
# client/ folder, so the build root is the REPO ROOT (no source_dir) and the run
# commands cd into server/. The repo-root requirements.txt is a shim that pulls in
# server/requirements.txt.
#
# Deploy / update:
#   doctl apps create --spec .do/app.yaml
#   doctl apps update <app-id> --spec .do/app.yaml
#
# Secrets: set the REAL values in the dashboard (App -> Settings -> Environment
# Variables) or via doctl. NEVER commit real secret values to this file.
name: superpredicto
region: nyc   # TODO: set to the region closest to your Supabase project (lowest DB latency)

# App-level envs propagate to every component (web service + migrate job).
envs:
  - key: APP_ENV
    value: prod
    scope: RUN_TIME
  - key: FLASK_APP
    value: wsgi:app
    scope: RUN_TIME
  - key: MAIL_FROM_ADDRESS
    value: no-reply@superpredicto.com
    scope: RUN_TIME
  - key: MAIL_FROM_NAME
    value: SuperPredicto
    scope: RUN_TIME
  # --- secrets: set values in the dashboard; do NOT commit them ---
  - key: SUPABASE_URL          # full Postgres connection string -> SQLALCHEMY_DATABASE_URI
    type: SECRET
    scope: RUN_TIME
  - key: SECRET_KEY
    type: SECRET
    scope: RUN_TIME
  - key: SECURITY_PASSWORD_SALT
    type: SECRET
    scope: RUN_TIME
  - key: FOOTBALL_DATA_API_KEY
    type: SECRET
    scope: RUN_TIME
  - key: INTERNAL_SYNC_TOKEN
    type: SECRET
    scope: RUN_TIME
  - key: MAILEROO_API_KEY
    type: SECRET
    scope: RUN_TIME
  - key: PAYPAL_CLIENT_ID
    type: SECRET
    scope: RUN_TIME
  - key: PAYPAL_CLIENT_SECRET
    type: SECRET
    scope: RUN_TIME

services:
  - name: web
    github:
      repo: theswapmeat/superpredicto
      branch: main
      deploy_on_push: true
    environment_slug: python
    run_command: cd server && gunicorn --worker-tmp-dir /dev/shm --workers 2 --bind 0.0.0.0:$PORT wsgi:app
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs   # $5/mo
    health_check:
      http_path: /

jobs:
  # Runs after build, before the new web release takes traffic. flask db upgrade
  # is idempotent (a no-op when already at head), so it is safe on every deploy.
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: theswapmeat/superpredicto
      branch: main
    environment_slug: python
    run_command: cd server && flask db upgrade
    instance_size_slug: basic-xxs
