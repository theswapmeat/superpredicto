# ============================================================================
# DECOMMISSIONED 2026-07-23 — NOT DEPLOYED.
# After the 2026 tournament, the DigitalOcean Functions namespace and all three
# scheduled triggers were deleted (cost-down to free). Nothing in this folder is
# live. It's kept as the ready-made blueprint to re-enable these crons for a
# future tournament — see README.md to redeploy. Do NOT `doctl serverless deploy`
# this unless you intend to recreate the scheduled jobs.
# ============================================================================
#
# DigitalOcean Functions project: scheduled jobs that poke the app's token-guarded
# /internal/* endpoints. THREE scheduled triggers (DO caps triggers per namespace):
#   sync/poll      every 1m  -> /internal/sync-scores                      (live scores + rescoring)
#   remind/hourly  hourly    -> /internal/remind-signups + remind-payments (24h signup + 3-day pay nudges)
#   remind/picks   every 10m -> /internal/remind-picks                     (kickoff-in-2h pick nudge)
#
# Scheduler crons run year-round (5-field cron has no year field); each function
# hard-codes a UTC window and no-ops outside it, and the app enforces the precise
# timing/dedupe. See each packages/*/__main__.py.
#
# ${APP_URL} and ${SYNC_TOKEN} are substituted at deploy time from a local .env
# file in this directory (gitignored) or your shell environment. See README.md.
parameters: {}
environment: {}
packages:
  - name: sync
    parameters: {}
    environment: {}
    functions:
      - name: poll
        binary: false
        main: ''
        runtime: 'python:default'
        web: false           # not publicly invokable; only the trigger calls it
        parameters: {}
        environment:
          APP_URL: ${APP_URL}
          SYNC_TOKEN: ${SYNC_TOKEN}
        limits:
          timeout: 60000     # ms — the endpoint also talks to football-data.org
        triggers:
          # Name kept as poll-5min (renaming would churn the trigger and risk DO's
          # per-namespace trigger cap); it now fires EVERY MINUTE so the live
          # leaderboard refreshes ~1/min during matches.
          - name: poll-5min
            sourceType: scheduler
            sourceDetails:
              cron: '* * * * *'     # every minute (UTC)
              withBody: {}
  - name: remind
    parameters: {}
    environment: {}
    functions:
      # Hourly reminders — signups + payments MERGED into one trigger to stay within
      # DigitalOcean's per-namespace scheduled-trigger limit. POSTs to BOTH
      # /internal/remind-signups and /internal/remind-payments; each is window-gated
      # and idempotent in the app, so one hourly call drives both safely.
      - name: hourly
        binary: false
        main: ''
        runtime: 'python:default'
        web: false
        parameters: {}
        environment:
          APP_URL: ${APP_URL}
          SYNC_TOKEN: ${SYNC_TOKEN}
        limits:
          timeout: 60000
        triggers:
          - name: reminders-hourly
            sourceType: scheduler
            sourceDetails:
              cron: '0 * * * *'    # hourly, on the hour (UTC)
              withBody: {}
      # "Make your pick" — emails paid+active participants who haven't predicted a
      # game kicking off within the next 2h (once per user/game). Tournament-windowed.
      - name: picks
        binary: false
        main: ''
        runtime: 'python:default'
        web: false
        parameters: {}
        environment:
          APP_URL: ${APP_URL}
          SYNC_TOKEN: ${SYNC_TOKEN}
        limits:
          timeout: 60000
        triggers:
          - name: picks-10min
            sourceType: scheduler
            sourceDetails:
              cron: '*/10 * * * *'   # every 10 minutes (UTC)
              withBody: {}
